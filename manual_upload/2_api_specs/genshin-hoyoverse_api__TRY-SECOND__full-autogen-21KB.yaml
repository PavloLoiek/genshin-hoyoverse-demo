openapi: 3.0.3
info:
  title: HoYoverse — Genshin Impact Player Support API
  description: Mock API server for the Genshin Impact player support Copilot demo.
  version: 1.0.0
  contact:
    name: HoYoverse Player Support Demo
    email: support@hoyoverse-demo.com
servers:
- url: https://genshin-hoyoverse.onrender.com
  description: Render hosted demo
paths:
  /health:
    get:
      tags:
      - System
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /documents:
    get:
      tags:
      - Documents
      summary: List Documents
      operationId: list_documents_documents_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /documents/{filename}:
    get:
      tags:
      - Documents
      summary: Serve Document
      operationId: serve_document_documents__filename__get
      parameters:
      - name: filename
        in: path
        required: true
        schema:
          type: string
          title: Filename
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /manual_upload:
    get:
      tags:
      - Documents
      summary: List Manual Upload
      operationId: list_manual_upload_manual_upload_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /manual_upload/{stage}/{filename}:
    get:
      tags:
      - Documents
      summary: Serve Manual Upload
      operationId: serve_manual_upload_manual_upload__stage___filename__get
      parameters:
      - name: stage
        in: path
        required: true
        schema:
          type: string
          title: Stage
      - name: filename
        in: path
        required: true
        schema:
          type: string
          title: Filename
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /openapi-spec:
    get:
      tags:
      - Documents
      summary: Serve Openapi Spec
      operationId: serve_openapi_spec_openapi_spec_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/player/search:
    get:
      tags:
      - Account Recovery
      summary: Search Player
      description: 'Knowledge-based player search for account recovery when the caller does not have their UID.

        Requires at least 3 matching fields to return a result (prevents false positives).'
      operationId: search_player_api_player_search_get
      parameters:
      - name: last_topup_amount_usd
        in: query
        required: false
        schema:
          type: number
          nullable: true
          title: Last Topup Amount Usd
      - name: last_topup_date
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Last Topup Date
      - name: device_model
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Device Model
      - name: server_region
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Server Region
      - name: last_5star_pulled
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Last 5Star Pulled
      - name: adventure_rank
        in: query
        required: false
        schema:
          type: integer
          nullable: true
          title: Adventure Rank
      - name: hoyoverse_email
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Hoyoverse Email
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/player/search_by_platform:
    get:
      tags:
      - Account Recovery
      summary: Search Player By Platform
      description: Platform-based lookup for callers who have their linked platform credentials.
      operationId: search_player_by_platform_api_player_search_by_platform_get
      parameters:
      - name: linked_platform
        in: query
        required: true
        schema:
          type: string
          description: Apple | PSN | HoYoverse | Google | Xbox
          title: Linked Platform
        description: Apple | PSN | HoYoverse | Google | Xbox
      - name: linked_platform_id
        in: query
        required: true
        schema:
          type: string
          description: Platform-specific ID / username
          title: Linked Platform Id
        description: Platform-specific ID / username
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/player/{uid}:
    get:
      tags:
      - Account Recovery
      summary: Get Player Account
      description: Retrieve full player account by UID.
      operationId: get_player_account_api_player__uid__get
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          title: Uid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/account/verify_ownership:
    post:
      tags:
      - Account Recovery
      summary: Verify Ownership
      description: 'Verify ownership of a UID by matching caller-provided knowledge-based answers

        against the stored account. Returns a match score 0-5.'
      operationId: verify_ownership_api_account_verify_ownership_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOwnershipRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/account/initiate_recovery:
    post:
      tags:
      - Account Recovery
      summary: Initiate Account Recovery
      description: Open a recovery ticket. Returns a recovery case ID.
      operationId: initiate_account_recovery_api_account_initiate_recovery_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateRecoveryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/account/reset_login_method:
    post:
      tags:
      - Account Recovery
      summary: Reset Login Method
      description: Reset the primary login email or phone for a verified account.
      operationId: reset_login_method_api_account_reset_login_method_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetLoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/wishes/active_banners:
    get:
      tags:
      - Wish and Gacha
      summary: Get Active Banners
      description: List current character event, weapon event, and standard banners.
      operationId: get_active_banners_api_wishes_active_banners_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/player/{uid}/wish_history:
    get:
      tags:
      - Wish and Gacha
      summary: Get Wish History
      description: Return wish history summary for a player, optionally filtered by banner.
      operationId: get_wish_history_api_player__uid__wish_history_get
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          title: Uid
      - name: banner
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Banner
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/player/{uid}/pity_counter:
    get:
      tags:
      - Wish and Gacha
      summary: Get Pity Counter
      description: Return current pity status on the active banner.
      operationId: get_pity_counter_api_player__uid__pity_counter_get
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          title: Uid
      - name: banner
        in: query
        required: false
        schema:
          type: string
          nullable: true
          title: Banner
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orders/{order_id}:
    get:
      tags:
      - Top-Up and Refund
      summary: Get Order Status
      description: Retrieve order by order ID.
      operationId: get_order_status_api_orders__order_id__get
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          title: Order Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orders/{order_id}/retry_delivery:
    post:
      tags:
      - Top-Up and Refund
      summary: Retry Crystal Delivery
      description: Retry Genesis Crystal delivery for an order that got stuck in payment-successful / crystals-not-delivered
        state.
      operationId: retry_crystal_delivery_api_orders__order_id__retry_delivery_post
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          title: Order Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/refunds:
    post:
      tags:
      - Top-Up and Refund
      summary: Initiate Refund
      description: Open a refund ticket. Minor accounts require guardian verification before approval.
      operationId: initiate_refund_api_refunds_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/refunds/guardian_verification:
    post:
      tags:
      - Top-Up and Refund
      summary: Verify Guardian
      description: 'Guardian verification for Minor Account refunds.

        Checks stored guardian name + child SSN last4 + payment last4 against seed record.'
      operationId: verify_guardian_api_refunds_guardian_verification_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardianVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/incidents:
    get:
      tags:
      - Compensation and Bugs
      summary: Check Known Incidents
      description: List all confirmed service incidents.
      operationId: check_known_incidents_api_incidents_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/incidents/affects/{uid}:
    get:
      tags:
      - Compensation and Bugs
      summary: List Affecting Incidents
      description: List known incidents that affect the given UID based on its server region / UID prefix.
      operationId: list_affecting_incidents_api_incidents_affects__uid__get
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
          title: Uid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/compensation/tickets:
    post:
      tags:
      - Compensation and Bugs
      summary: Submit Compensation Ticket
      description: Open a compensation ticket. Returns the ticket ID and standard compensation amount if applicable.
      operationId: submit_compensation_ticket_api_compensation_tickets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompensationTicketRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/mail/ingame:
    post:
      tags:
      - Compensation and Bugs
      summary: Issue Ingame Mail
      description: Queue an in-game mail to the player, optionally with item attachments (Primogems, Fates).
      operationId: issue_ingame_mail_api_mail_ingame_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngameMailRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    CompensationTicketRequest:
      properties:
        uid:
          type: string
          title: Uid
        incident_id:
          type: string
          nullable: true
          title: Incident Id
        category:
          type: string
          title: Category
          description: outage | bug | lost_items | missing_rewards
        description:
          type: string
          title: Description
        requested_primogems:
          type: integer
          nullable: true
          title: Requested Primogems
      type: object
      required:
      - uid
      - category
      - description
      title: CompensationTicketRequest
    GuardianVerificationRequest:
      properties:
        uid:
          type: string
          title: Uid
        guardian_name:
          type: string
          title: Guardian Name
        gov_id_last4:
          type: string
          title: Gov Id Last4
        child_dob:
          type: string
          title: Child Dob
        payment_last4:
          type: string
          title: Payment Last4
      type: object
      required:
      - uid
      - guardian_name
      - gov_id_last4
      - child_dob
      - payment_last4
      title: GuardianVerificationRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    IngameMailRequest:
      properties:
        uid:
          type: string
          title: Uid
        subject:
          type: string
          title: Subject
        body:
          type: string
          title: Body
        attachments:
          items:
            type: string
          type: array
          nullable: true
          title: Attachments
      type: object
      required:
      - uid
      - subject
      - body
      title: IngameMailRequest
    InitiateRecoveryRequest:
      properties:
        uid:
          type: string
          title: Uid
        verification_method:
          type: string
          title: Verification Method
          description: knowledge_based | email_otp | platform_link
        notes:
          type: string
          nullable: true
          title: Notes
      type: object
      required:
      - uid
      - verification_method
      title: InitiateRecoveryRequest
    RefundRequest:
      properties:
        order_id:
          type: string
          title: Order Id
        reason:
          type: string
          title: Reason
        is_minor_account:
          type: boolean
          nullable: true
          title: Is Minor Account
          default: false
      type: object
      required:
      - order_id
      - reason
      title: RefundRequest
    ResetLoginRequest:
      properties:
        uid:
          type: string
          title: Uid
        new_email:
          type: string
          nullable: true
          title: New Email
        new_phone:
          type: string
          nullable: true
          title: New Phone
      type: object
      required:
      - uid
      title: ResetLoginRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    VerifyOwnershipRequest:
      properties:
        uid:
          type: string
          nullable: true
          title: Uid
        last_topup_amount_usd:
          type: number
          nullable: true
          title: Last Topup Amount Usd
        last_topup_date:
          type: string
          nullable: true
          title: Last Topup Date
        last_5star_pulled:
          type: string
          nullable: true
          title: Last 5Star Pulled
        device_model:
          type: string
          nullable: true
          title: Device Model
        adventure_rank:
          type: integer
          nullable: true
          title: Adventure Rank
        server_region:
          type: string
          nullable: true
          title: Server Region
        hoyoverse_email:
          type: string
          nullable: true
          title: Hoyoverse Email
      type: object
      title: VerifyOwnershipRequest
